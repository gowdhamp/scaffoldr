# Filename: .github/workflows/ruff.yaml

name: Ruff

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    name: Run Ruff Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Ruff
        run: |
          pip install ruff
          ruff --version

      - name: Ruff — lint check
        run: ruff check . --output-format=github

      - name: Ruff — format check
        run: ruff format --check .
