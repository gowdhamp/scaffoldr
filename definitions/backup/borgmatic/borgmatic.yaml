heading:
  title: "Scaffoldr - Borgmatic Configuration Wizard"
  before:
    - title: "Backup Source"
      subtitle: "Specify the source data and metadata for this backup set."
      prompts:
        - key: backup_name
          prompt: "Backup set name"
          description: "A unique name to identify this backup set (e.g., 'web-server-files')."
          required: true
        - key: source_directory
          prompt: "Source directory absolute path"
          description: "The full path to the directory you want to back up (e.g., /srv/www)."
          required: true
        - key: exclude_patterns
          prompt: "Exclude patterns"
          description: "Comma-separated patterns to exclude from the backup (optional)."
          is_list: true

    - title: "Backup Repository"
      subtitle: "Configure the location and access details for the backup repository."
      prompts:
        - key: repository_path
          prompt: "Repository URI"
          description: "The path or URI where backups will be stored (e.g., /mnt/backup or ssh://user@host/./repo)."
          required: true
        - key: repository_label
          prompt: "Repository label"
          description: "A short identifier for this repository used in logs and notifications (e.g., 'remote' or 'local-hdd')."
          default: "{{ backup_name }}"
        - key: remote_path
          prompt: "Remote Borg path"
          description: "Path to the borg executable on the remote server. Leave as 'borg' for default."
          default: "borg"
        - key: encryption_passphrase
          prompt: "Repository passphrase"
          description: "The passphrase used to encrypt the backup repository."
          is_password: true

    - title: "Storage & Archiving"
      subtitle: "Define naming conventions and archival settings."
      prompts:
        - key: archive_name_format
          prompt: "Archive name prefix"
          description: "Prefix for generated archive names."
          default: "{{ backup_name }}"

    - title: "Retention Policy"
      subtitle: "Define how many archives to keep for different time intervals."
      prompts:
        - key: retention_hourly
          prompt: "Keep hourly"
          description: "Number of hourly archives to retain (0 to disable)."
          default: '0'
        - key: retention_daily
          prompt: "Keep daily"
          description: "Number of daily archives to retain."
          default: '7'
        - key: retention_weekly
          prompt: "Keep weekly"
          description: "Number of weekly archives to retain."
          default: '4'
        - key: retention_monthly
          prompt: "Keep monthly"
          description: "Number of monthly archives to retain."
          default: '6'
        - key: retention_yearly
          prompt: "Keep yearly"
          description: "Number of yearly archives to retain."
          default: '1'

    - title: "Integrity Checks"
      subtitle: "Configure repository maintenance and consistency checks."
      prompts:
        - key: consistency_checks
          prompt: "Checks list"
          description: "Comma-separated list of checks (repository, archives, data)."
          default: "repository,archives"
          is_list: true

    - title: "Database Backup"
      subtitle: "Optional: dump a database to disk before the backup runs so the dump is captured in the same snapshot."
      prompts:
        - key: db_type
          prompt: "Database type"
          description: "Type of database to dump before backup. Choose 'none' to skip."
          choices: ["none", "mysql", "postgres", "wordpress", "docker-mysql", "docker-postgres"]
          default: "none"
        - key: db_name
          prompt: "Database name"
          description: "Name of the database to dump."
          depends_on:
            key: db_type
            value: ["mysql", "postgres", "wordpress", "docker-mysql", "docker-postgres"]
        - key: db_host
          prompt: "DB host"
          description: "Database server hostname or IP."
          default: "localhost"
          depends_on:
            key: db_type
            value: ["mysql", "postgres"]
        - key: db_port
          prompt: "DB port"
          description: "Database server port (leave blank for default: 3306 MySQL / 5432 PostgreSQL)."
          depends_on:
            key: db_type
            value: ["mysql", "postgres"]
        - key: db_user
          prompt: "DB user"
          description: "Database user to authenticate with."
          depends_on:
            key: db_type
            value: ["mysql", "postgres", "docker-mysql", "docker-postgres"]
        - key: db_password
          prompt: "DB password"
          description: "Database password."
          is_password: true
          depends_on:
            key: db_type
            value: ["mysql", "postgres", "docker-mysql", "docker-postgres"]
        - key: docker_container_name
          prompt: "Docker container name"
          description: "Name of the running Docker container to exec into."
          depends_on:
            key: db_type
            value: ["docker-mysql", "docker-postgres"]
    - title: "Monitoring"
      prompts:
        - key: healthcheck_url
          prompt: "Healthchecks ping URL (optional)"
          description: "Base ping URL for borgmatic's native healthchecks integration (e.g. https://hc-ping.com/<uuid>). borgmatic will ping start/finish/fail automatically. Leave blank to skip."
          required: false
  after:
    logs:
      success: "Borgmatic configuration successfully generated at {output_path}"
      error: "Failed to generate configuration: {e}"
    notes:
      - "Action required: Initialize the Borg repository before running the first backup.\nRun: borgmatic rcreate -e repokey\n(Use '-e none' if you did not set a passphrase. Use '-e repokey-blake2' for faster encryption.)"
