heading:
  title: "Scaffoldr - Autorestic Configuration Wizard"
  before:
    - title: "Location"
      subtitle: "Define the backup source and destination."
      prompts:
        - key: location_name
          prompt: "Location name"
          description: "A friendly name for this data source (e.g., 'production-db')."
          required: true
        - key: location_from
          prompt: "Source directory"
          description: "The absolute path of the directory you want to back up."
          required: true
        - key: location_to
          prompt: "Target Backend(s)"
          description: "Comma-separated list of backend names to store backups."
          default: "s3"

    - title: "Hooks"
      subtitle: "Execute shell commands at specific lifecycle events (optional)."
      prompts:
        - key: hook_before
          prompt: "Pre-backup command"
          description: "Command to run before starting the backup (e.g., 'systemctl stop my-app')."
        - key: hook_success
          prompt: "Success command"
          description: "Command to run after a successful backup."
        - key: hook_failure
          prompt: "Failure command"
          description: "Command to run if the backup fails."

    - title: "Database Backup"
      subtitle: "Optional: dump a database to disk before the backup runs so the dump is captured in the same snapshot."
      prompts:
        - key: db_type
          prompt: "Database type"
          description: "Type of database to dump before backup. Choose 'none' to skip."
          choices: ["none", "mysql", "postgres", "wordpress", "docker-mysql", "docker-postgres"]
          default: "none"
        - key: db_name
          prompt: "Database name"
          description: "Name of the database to dump."
          depends_on:
            key: db_type
            value: ["mysql", "postgres", "wordpress", "docker-mysql", "docker-postgres"]
        - key: db_host
          prompt: "DB host"
          description: "Database server hostname or IP."
          default: "localhost"
          depends_on:
            key: db_type
            value: ["mysql", "postgres"]
        - key: db_port
          prompt: "DB port"
          description: "Database server port (leave blank for default: 3306 MySQL / 5432 PostgreSQL)."
          depends_on:
            key: db_type
            value: ["mysql", "postgres"]
        - key: db_user
          prompt: "DB user"
          description: "Database user to authenticate with."
          depends_on:
            key: db_type
            value: ["mysql", "postgres", "docker-mysql", "docker-postgres"]
        - key: db_password
          prompt: "DB password"
          description: "Database password."
          is_password: true
          depends_on:
            key: db_type
            value: ["mysql", "postgres", "docker-mysql", "docker-postgres"]
        - key: docker_container_name
          prompt: "Docker container name"
          description: "Name of the running Docker container to exec into."
          depends_on:
            key: db_type
            value: ["docker-mysql", "docker-postgres"]
    - title: "Backend Storage"
      subtitle: "Configure where your backups will be physically stored."
      prompts:
        - key: backend_name
          prompt: "Backend identifier"
          description: "A unique name for this storage backend (e.g., 'primary-s3')."
          default: "{{ location_to }}"
        - key: backend_type
          prompt: "Backend type"
          description: "The storage provider to use."
          choices: ["s3", "b2", "local", "sftp", "azure", "gs"]
          default: "s3"
        - key: backend_path
          prompt: "Repository path"
          description: "The target destination. S3: 's3.amazonaws.com/bucket'. B2: 'bucket:folder'. SFTP: 'sftp:user@host:/path'. Local: '/mnt/backup'."
        - key: backend_env_aws_access_key_id
          prompt: "AWS Access Key ID"
          description: "Required for S3 backend."
          depends_on:
            key: backend_type
            value: "s3"
        - key: backend_env_aws_secret_access_key
          prompt: "AWS Secret Access Key"
          description: "Required for S3 backend."
          is_password: true
          depends_on:
            key: backend_type
            value: "s3"
        - key: backend_env_b2_account_id
          prompt: "B2 Account ID"
          description: "Backblaze B2 account or application key ID."
          depends_on:
            key: backend_type
            value: "b2"
        - key: backend_env_b2_account_key
          prompt: "B2 Account Key"
          description: "Backblaze B2 application key."
          is_password: true
          depends_on:
            key: backend_type
            value: "b2"
        - key: backend_key
          prompt: "Encryption key"
          description: "Passphrase for Restic repository encryption."
          is_password: true

    - title: "Monitoring"
      prompts:
        - key: healthcheck_url
          prompt: "Healthcheck URL (optional)"
          description: "Ping URL to signal backup status (e.g. https://hc-ping.com/<uuid> or https://uptime.example.com/api/push/<token>). Leave blank to skip."
          required: false

    - title: "Retention Strategy (Forget)"
      subtitle: "Define how many snapshots to keep. Autorestic will automatically forget old snapshots after each backup."
      prompts:
        - key: forget_trigger
          prompt: "Auto-forget mode"
          description: "'prune' removes old snapshots and frees disk space after every backup. 'yes' marks them as forgotten but does not reclaim space immediately."
          choices: ["prune", "yes"]
          default: "prune"
        - key: forget_keep_last
          prompt: "Keep last X snapshots"
          description: "Number of most recent snapshots to always keep."
          default: '5'
        - key: forget_keep_daily
          prompt: "Keep daily"
          description: "Number of daily snapshots to keep."
          default: '7'
        - key: forget_keep_weekly
          prompt: "Keep weekly"
          description: "Number of weekly snapshots to keep."
          default: '4'
        - key: forget_keep_monthly
          prompt: "Keep monthly"
          description: "Number of monthly snapshots to keep."
          default: '6'
        - key: forget_keep_yearly
          prompt: "Keep yearly"
          description: "Number of yearly snapshots to keep (0 to disable)."
          default: '1'

  after:
    logs:
      success: "Successfully created autorestic.yml at {output_path}"
      error: "Error creating file: {e}"
